<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Random Password Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet">
</head>
<body>

<div class="container">
    <div class="heading">
        <div class="vertical-block"></div>
        <h1>
            <span style="color: darkgreen;">Random</span><br>
            <span style="color: yellow;">Password</span><br>
            <span style="color: darkred;">Generator</span><br>
            <span style="color: white; font-size: 0.8em; font-weight: normal;">in JavaScript</span>
        </h1>

    </div>
    <div class="password-generator">
        <div class="password-generator-card">
            <h4 class="card-title"> Password Generator</h4>
            <hr>
            <div class="card-body">
                <div class="display-password">
                    <input type="text" disabled id="password" placeholder="Random Password">
                    <img src="copy.png" id="copy-password" alt="Copy">
                </div>
                <div class="pass-indicator-container">
                    <div class="pass-indicator">
                        <div id="password-strength"></div>
                    </div>
                    <p id="password-strength-text"> Weak</p>
                </div>
                <div class="pass-length">
                    <div class="details">
                        <div class="title">Password Length</div>
                    </div>
                    <input type="range" min="1" max="30" value="15" step="1" id="password-length">
                    <p id="password-length-value">15</p>
                </div>
                <div class="pass-settings-container">
                    <p>Password Settings</p>
                    <div class="pass-settings">
                        <div class="row">
                            <div class="col-6 form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="lowercases" checked>
                                <label class="form-check-label" for="lowercases">Lowercase (a-z)</label>
                            </div>
                            <div class="col-6 form-check form-switch">
                                <input class="form-check-input" type="checkbox" role="switch" id="uppercases">
                                <label class="form-check-label" for="uppercases">Uppercase (A-Z)</label>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6 form-check form-switch">
                                <input class="form-check-input" type="checkbox" role="switch" id="numbers">
                                <label class="form-check-label" for="numbers">Numbers (0-9)</label>
                            </div>
                            <div class="col-6 form-check form-switch">
                                <input class="form-check-input" type="checkbox" role="switch" id="symbols">
                                <label class="form-check-label" for="symbols">Symbols (!~&$^)</label>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6 form-check form-switch">
                                <input class="form-check-input" type="checkbox" role="switch" id="exclude-duplicates">
                                <label class="form-check-label" for="exclude-duplicates">Exclude Duplicate</label>
                            </div>
                            <div class="col-6 form-check form-switch">
                                <input class="form-check-input" type="checkbox" role="switch" id="include-spaces">
                                <label class="form-check-label" for="include-spaces">Include Spaces</label>
                            </div>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-primary password-button">Create Password</button>
            </div>

        </div>

    </div>
</div>


<script src="index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
